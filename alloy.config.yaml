title: "Alloy"
baseURL: "https://www.alloyssg.dev"

build:
  output: _site
  clean: true

content:
  formats: ["md", "html"]
  markdown:
    goldmark:
      unsafe: true
      typographer: true

templates:
  engine: "liquid"

collections:
  releases:
    sortBy: "date"
    order: "desc"

structure:
  content: "docs/content"
  layouts: "docs/layouts"
  static: "docs/static"
  data: "docs/data"
