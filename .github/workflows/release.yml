name: Release

on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    if: github.head_ref == 'release/next' && github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Get version
        id: version
        run: |
          VERSION=$(grep -oP 'Version = "\K[0-9]+\.[0-9]+\.[0-9]+' cmd/version.go)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Extract release notes
        id: notes
        run: |
          # Extract the first version section from CHANGELOG.md
          # (everything between the first ## and the second ##)
          awk '/^## /{if(n++)exit}n' CHANGELOG.md > /tmp/release-notes.md

      - name: Cross-compile
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          mkdir -p dist

          LDFLAGS="-s -w -X github.com/zeroedin/alloy/cmd.Version=${VERSION}"
          TARGETS=(
            "linux/amd64"
            "linux/arm64"
            "darwin/amd64"
            "darwin/arm64"
            "windows/amd64"
            "windows/arm64"
          )

          for target in "${TARGETS[@]}"; do
            GOOS="${target%/*}"
            GOARCH="${target#*/}"
            OUTPUT="dist/alloy-${GOOS}-${GOARCH}"
            [ "$GOOS" = "windows" ] && OUTPUT="${OUTPUT}.exe"

            echo "Building ${GOOS}/${GOARCH}..."
            CGO_ENABLED=0 GOOS="$GOOS" GOARCH="$GOARCH" \
              go build -ldflags="$LDFLAGS" -o "$OUTPUT" .
          done

      - name: Collect third-party licenses
        run: |
          go install github.com/google/go-licenses@latest
          go-licenses save ./... --save_path=dist/THIRD_PARTY_LICENSES
          cp LICENSE dist/LICENSE

      - name: Package archives
        run: |
          set -euo pipefail
          cd dist

          for bin in alloy-*; do
            [ ! -f "$bin" ] && continue
            name="${bin%.exe}"

            case "$bin" in
              *.exe)
                zip -r "${name}.zip" "$bin" LICENSE THIRD_PARTY_LICENSES
                rm "$bin"
                ;;
              *)
                tar czf "${name}.tar.gz" "$bin" LICENSE THIRD_PARTY_LICENSES
                rm "$bin"
                ;;
            esac
          done

          rm -rf LICENSE THIRD_PARTY_LICENSES
          sha256sum * > checksums.txt

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          gh release create "v${VERSION}" dist/* \
            --title "v${VERSION}" \
            --notes-file /tmp/release-notes.md

      - name: Update Homebrew tap
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          gh workflow run update-formula.yml \
            --repo zeroedin/homebrew-alloy-ssg \
            --field version="${{ steps.version.outputs.version }}"
